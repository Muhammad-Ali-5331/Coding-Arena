<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeForge — Elite Programming Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script>
      // ============================================================
      // STYLES
      // ============================================================
      const styleEl = document.createElement("style");
      styleEl.textContent = `
:root {
  --bg0:#06070d;--bg1:#0b0d17;--bg2:#0f1120;--bg3:#141728;--bg4:#1a1f35;--bg5:#1e2540;
  --ln:#1f2540;--ln2:#2d3560;
  --t1:#eef0ff;--t2:#7b84b0;--t3:#3d4468;
  --neon:#4df0c0;--neon-d:rgba(77,240,192,.12);--neon-g:0 0 30px rgba(77,240,192,.25);
  --gold:#f5c842;--gold-d:rgba(245,200,66,.1);
  --coral:#ff5f7e;--coral-d:rgba(255,95,126,.1);
  --violet:#a78bfa;--vio-d:rgba(167,139,250,.1);
  --sky:#38bdf8;--orange:#fb923c;
  --green:#4ade80;--green-d:rgba(74,222,128,.1);
  --red:#f87171;--red-d:rgba(248,113,113,.1);
  --mono:'Fira Code',monospace;--sans:'Syne',sans-serif;
  --r:10px;--rl:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg0);color:var(--t1);font-family:var(--sans);overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ln2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--neon)}
.screen{display:none;height:100vh;width:100vw}
.screen.active{display:flex}

/* LOGIN */
#ls{align-items:center;justify-content:center;background:var(--bg0);position:relative;overflow:hidden;flex-direction:column}
#ls::before{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--ln) 1px,transparent 1px),linear-gradient(90deg,var(--ln) 1px,transparent 1px);background-size:50px 50px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);animation:gf 20s linear infinite}
@keyframes gf{0%{background-position:0 0}100%{background-position:50px 50px}}
.orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;animation:of 8s ease-in-out infinite}
.o1{width:500px;height:500px;background:rgba(77,240,192,.06);top:-100px;left:-100px}
.o2{width:400px;height:400px;background:rgba(167,139,250,.06);bottom:-50px;right:-50px;animation-delay:-4s}
.o3{width:300px;height:300px;background:rgba(245,200,66,.04);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-2s}
@keyframes of{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}
.lw{position:relative;z-index:2;text-align:center}
.ll{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:6px}
.lli{width:54px;height:54px;background:linear-gradient(135deg,var(--neon),var(--violet));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:var(--neon-g);animation:pb 3s ease-in-out infinite}
@keyframes pb{0%,100%{box-shadow:0 0 20px rgba(77,240,192,.3)}50%{box-shadow:0 0 50px rgba(77,240,192,.6)}}
.ll h1{font-size:42px;font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,var(--neon) 0%,var(--violet) 60%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ls{font-family:var(--mono);font-size:12px;color:var(--t3);letter-spacing:3px;text-transform:uppercase;margin-bottom:48px}
.rcs{display:flex;gap:20px;justify-content:center;margin-bottom:24px}
.rc{width:220px;padding:32px 24px;background:var(--bg2);border:1px solid var(--ln);border-radius:var(--rl);cursor:pointer;text-align:center;transition:all .3s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.rc::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s}
.rc.hc::before{background:radial-gradient(circle at 50% 0%,rgba(245,200,66,.12),transparent 70%)}
.rc.sc::before{background:radial-gradient(circle at 50% 0%,rgba(77,240,192,.1),transparent 70%)}
.rc:hover{transform:translateY(-6px) scale(1.02)}
.rc.hc:hover{border-color:var(--gold);box-shadow:0 20px 60px rgba(245,200,66,.15)}
.rc.sc:hover{border-color:var(--neon);box-shadow:0 20px 60px rgba(77,240,192,.12)}
.rc::before{opacity:1}
.ri{font-size:40px;margin-bottom:14px;display:block}
.rt{font-size:20px;font-weight:700;margin-bottom:6px}
.rd{font-size:12px;color:var(--t2);line-height:1.5}
.hc .rt{color:var(--gold)}.sc .rt{color:var(--neon)}
.lh{font-family:var(--mono);font-size:11px;color:var(--t3)}
.lh code{color:var(--neon);background:var(--neon-d);padding:1px 6px;border-radius:4px}

/* MODALS */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.mo.open{display:flex}
.md{background:var(--bg2);border:1px solid var(--ln2);border-radius:var(--rl);padding:36px;width:420px;box-shadow:0 40px 80px rgba(0,0,0,.6);animation:mi .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes mi{from{transform:scale(.9) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.md h3{font-size:20px;font-weight:700;margin-bottom:6px}.md p{color:var(--t2);font-size:13px;margin-bottom:20px}
.md input{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--ln);border-radius:var(--r);color:var(--t1);font-family:var(--mono);font-size:14px;margin-bottom:8px;outline:none;transition:all .2s}
.md input:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(77,240,192,.1)}
.mh{font-size:11px;color:var(--t3);font-family:var(--mono);margin-bottom:20px}
.mh code{color:var(--neon)}.mbs{display:flex;gap:10px}

/* BUTTONS */
.btn{padding:10px 22px;border-radius:var(--r);border:none;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px;letter-spacing:.3px}
.bn{background:var(--neon);color:#020810;box-shadow:0 0 20px rgba(77,240,192,.3)}
.bn:hover{background:#6ff7d2;box-shadow:0 0 30px rgba(77,240,192,.5);transform:translateY(-1px)}
.bg2{background:var(--gold);color:#1a1200;box-shadow:0 0 20px rgba(245,200,66,.2)}
.bg2:hover{background:#f7d060;transform:translateY(-1px)}
.bgh{background:transparent;color:var(--t2);border:1px solid var(--ln)}
.bgh:hover{border-color:var(--ln2);color:var(--t1);background:var(--bg3)}
.bd{background:var(--coral);color:#fff}
.bd:hover{background:#ff4060;transform:translateY(-1px)}
.bsm{padding:6px 14px;font-size:12px}.bxs{padding:4px 10px;font-size:11px;border-radius:6px}

/* TOPBAR */
.tb{height:56px;background:var(--bg1);border-bottom:1px solid var(--ln);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;z-index:100;position:relative}
.tb::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--neon),var(--violet),transparent);opacity:.4}
.tbr{display:flex;align-items:center;gap:10px;font-family:var(--sans);font-weight:800;font-size:18px;letter-spacing:-.5px;background:linear-gradient(135deg,var(--neon),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tbi{width:30px;height:30px;background:linear-gradient(135deg,var(--neon),var(--violet));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 14px rgba(77,240,192,.3)}
.rp{padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase}
.rph{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid rgba(245,200,66,.25)}
.rps{background:var(--neon-d);color:var(--neon);border:1px solid rgba(77,240,192,.2)}
.tbc{flex:1;display:flex;align-items:center;justify-content:center}
.tbt{font-size:14px;color:var(--t2);font-weight:500}
.tba{display:flex;align-items:center;gap:8px;margin-left:auto}
.tp{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--neon);background:var(--neon-d);padding:5px 14px;border-radius:20px;border:1px solid rgba(77,240,192,.2);letter-spacing:1px}
.timer-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--ln);background:var(--bg3);color:var(--t2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0;flex-shrink:0}
.timer-btn:hover{border-color:var(--neon);color:var(--neon);background:var(--bg4)}

/* HOST */
#hs{flex-direction:column}
.hb{flex:1;display:flex;overflow:hidden}
.sb{width:290px;background:var(--bg1);border-right:1px solid var(--ln);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sbt{padding:16px;border-bottom:1px solid var(--ln);display:flex;align-items:center;justify-content:space-between}
.sbt h3{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);font-family:var(--mono)}
.cb{background:var(--neon-d);color:var(--neon);border:1px solid rgba(77,240,192,.2);padding:1px 8px;border-radius:20px;font-size:11px;font-family:var(--mono)}
.tg{margin-bottom:4px}
.th{display:flex;align-items:center;gap:8px;padding:8px 16px 6px;cursor:pointer;user-select:none;transition:background .15s}
.th:hover{background:var(--bg3)}
.tic{font-size:15px}.tn{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t2)}
.tc2{font-family:var(--mono);font-size:10px;color:var(--t3);margin-left:auto}
.tch{font-size:10px;color:var(--t3);transition:transform .2s}
.th.col .tch{transform:rotate(-90deg)}
.ti{padding-bottom:4px}
.ti.col{display:none}
.pi{padding:10px 16px 10px 28px;cursor:pointer;border-left:2px solid transparent;transition:all .15s;position:relative}
.pi:hover{background:var(--bg3);border-left-color:var(--ln2)}
.pi.act{background:var(--bg5);border-left-color:var(--neon)}
.pir1{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.pit{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.pim{display:flex;align-items:center;gap:6px}
.pn{font-family:var(--mono);font-size:10px;color:var(--t3)}
.si2{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sin{background:var(--t3)}.sis{background:var(--green);box-shadow:0 0 6px rgba(74,222,128,.6)}
.sip{background:var(--orange);box-shadow:0 0 6px rgba(251,146,60,.5)}.sif{background:var(--red)}
.dc{font-size:9px;font-weight:700;font-family:var(--mono);padding:1px 6px;border-radius:8px;letter-spacing:.5px;text-transform:uppercase}
.dce{color:var(--green);background:var(--green-d)}.dcm{color:var(--gold);background:var(--gold-d)}.dch{color:var(--coral);background:var(--coral-d)}
.pir2{font-size:10px;color:var(--t3);font-family:var(--mono)}
.sbf{padding:12px;border-top:1px solid var(--ln)}
.ep{padding:40px 20px;text-align:center;color:var(--t3)}
.epi{font-size:40px;margin-bottom:12px;opacity:.4}
.ept{font-size:13px;line-height:1.6;color:var(--t3)}
.hm{flex:1;overflow-y:auto;padding:28px 36px;background:var(--bg0)}
.fc{background:var(--bg2);border:1px solid var(--ln);border-radius:var(--rl);padding:28px;margin-bottom:20px;transition:border-color .2s}
.fc:hover{border-color:var(--ln2)}
.fct{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-family:var(--mono);color:var(--neon);margin-bottom:22px;display:flex;align-items:center;gap:10px}
.fct::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--ln2),transparent)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.fg{margin-bottom:16px}.fg:last-child{margin-bottom:0}
.fl{display:block;font-size:11px;font-weight:600;font-family:var(--mono);color:var(--t2);margin-bottom:7px;letter-spacing:.5px}
.fi,.fsel,.fta{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--ln);border-radius:var(--r);color:var(--t1);font-family:var(--sans);font-size:14px;outline:none;transition:all .2s}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(77,240,192,.08);background:var(--bg4)}
.fsel option{background:var(--bg3)}
.fta{resize:vertical;min-height:110px;line-height:1.7;font-size:14px}
.fma{font-family:var(--mono);font-size:13px;min-height:80px}
.tw{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;min-height:46px;background:var(--bg3);border:1px solid var(--ln);border-radius:var(--r);align-items:center;cursor:text;transition:all .2s}
.tw:focus-within{border-color:var(--neon);box-shadow:0 0 0 3px rgba(77,240,192,.08)}
.tp2{display:flex;align-items:center;gap:5px;padding:3px 10px;background:var(--bg4);border:1px solid var(--ln2);border-radius:20px;font-size:12px}
.tpr{background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px;line-height:1;padding:0;transition:color .15s}
.tpr:hover{color:var(--coral)}
.tri{background:none;border:none;outline:none;color:var(--t1);font-size:13px;font-family:var(--sans);min-width:90px}
.id{border:2px dashed var(--ln);border-radius:var(--r);padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3);position:relative;overflow:hidden}
.id:hover{border-color:var(--neon);background:var(--bg4)}
.id:hover .idi{transform:translateY(-4px)}
.idi{font-size:36px;margin-bottom:10px;transition:transform .3s;display:block}
.id p{font-size:13px;color:var(--t2)}.id small{font-size:11px;color:var(--t3)}
.iprev{max-width:100%;max-height:220px;border-radius:var(--r);margin-top:14px;border:1px solid var(--ln)}
.ew{border:1px solid var(--ln);border-radius:var(--r);overflow:hidden}
.etb{background:var(--bg3);padding:8px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--ln)}
.etb span{font-family:var(--mono);font-size:12px;color:var(--t2)}
.ltb{padding:4px 12px;border-radius:6px;border:1px solid var(--ln);background:none;color:var(--t2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s}
.ltb:hover{border-color:var(--ln2);color:var(--t1)}
.ltb.act{background:var(--neon-d);border-color:var(--neon);color:var(--neon)}
.CodeMirror{height:200px !important;font-family:var(--mono) !important;font-size:13px !important;background:var(--bg2) !important;line-height:1.6 !important}
.CodeMirror-scroll{padding:6px 0}
.CodeMirror-gutters{background:var(--bg2) !important;border-right:1px solid var(--ln) !important}
.tcc{background:var(--bg3);border:1px solid var(--ln);border-radius:var(--r);margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.tcc:hover{border-color:var(--ln2)}
.tch2{padding:10px 14px;background:var(--bg4);border-bottom:1px solid var(--ln);display:flex;align-items:center;justify-content:space-between}
.tcl{font-family:var(--mono);font-size:12px;font-weight:500}
.tchr{display:flex;align-items:center;gap:8px}
.hp{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--vio-d);color:var(--violet);border:1px solid rgba(167,139,250,.3);font-family:var(--mono);letter-spacing:.5px}
.sp{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--neon-d);color:var(--neon);border:1px solid rgba(77,240,192,.2);font-family:var(--mono)}
.tcb{padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tcf label{font-size:10px;color:var(--t3);display:block;margin-bottom:5px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase}
.tcf textarea{width:100%;padding:9px 10px;background:var(--bg2);border:1px solid var(--ln);border-radius:6px;color:var(--t1);font-family:var(--mono);font-size:12px;resize:vertical;min-height:70px;outline:none;line-height:1.5;transition:border-color .15s}
.tcf textarea:focus{border-color:var(--neon)}
.tce{padding:0 14px 14px}
.tce label{font-size:10px;color:var(--t3);display:block;margin-bottom:5px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase}
.tce textarea{width:100%;padding:9px 10px;background:var(--bg2);border:1px solid var(--ln);border-radius:6px;color:var(--t1);font-family:var(--sans);font-size:13px;resize:vertical;min-height:56px;outline:none;line-height:1.6;transition:border-color .15s}
.tce textarea:focus{border-color:var(--neon)}
.atr{display:flex;gap:8px;margin-top:10px}
.fa{display:flex;gap:10px;justify-content:flex-end;padding-top:20px}
.hw{max-width:700px;margin:50px auto 0;text-align:center}
.hwl{font-size:56px;margin-bottom:16px}
.hwt{font-size:28px;font-weight:800;margin-bottom:10px}
.hws{color:var(--t2);font-size:15px;line-height:1.6;margin-bottom:36px}
.hwf{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.hwfc{background:var(--bg2);border:1px solid var(--ln);border-radius:var(--r);padding:20px;text-align:left;transition:all .2s}
.hwfc:hover{border-color:var(--ln2);transform:translateY(-2px)}
.hwfi{font-size:24px;margin-bottom:8px}
.hwfc h4{font-size:13px;margin-bottom:4px}
.hwfc p{font-size:12px;color:var(--t3);line-height:1.5}

/* SOLVER */
#ss{flex-direction:column}
.solb{flex:1;display:flex;overflow:hidden}
.ssb{width:270px;background:var(--bg1);border-right:1px solid var(--ln);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.ssbh{padding:14px 16px 10px;border-bottom:1px solid var(--ln)}
.ssbh h3{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);font-family:var(--mono);margin-bottom:10px}
.prt{height:3px;background:var(--ln);border-radius:2px;overflow:hidden;margin-bottom:6px}
.prf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--neon),var(--violet));transition:width .5s ease}
.prl{font-family:var(--mono);font-size:10px;color:var(--t3)}
.spl{flex:1;overflow-y:auto;padding:8px 0}
.spi{padding:11px 14px;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.spi:hover{background:var(--bg3);border-left-color:var(--ln2)}
.spi.act{background:var(--bg5);border-left-color:var(--neon)}
.spr1{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.spn{font-family:var(--mono);font-size:10px;color:var(--t3)}
.spt{font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spr2{display:flex;align-items:center;gap:6px}
.sth{padding:10px 14px 4px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);font-family:var(--mono);display:flex;align-items:center;gap:7px;border-top:1px solid var(--ln);margin-top:4px}
.sth:first-child{border-top:none;margin-top:0}

/* ── RESIZABLE SPLIT ── */
.split-divider {
  width: 5px; cursor: col-resize; background: var(--ln);
  flex-shrink: 0; position: relative; transition: background .15s;
  display: flex; align-items: center; justify-content: center;
}
.split-divider:hover, .split-divider.dragging { background: var(--neon); }
.split-divider::after {
  content: '⋮'; color: var(--ln2); font-size: 14px;
  position: absolute; pointer-events: none;
  transition: color .15s;
}
.split-divider:hover::after, .split-divider.dragging::after { color: var(--neon); }

/* ── LIGHT MODE ── */
body.light {
  --bg0:#f0f2f8;--bg1:#e8eaf4;--bg2:#ffffff;--bg3:#f4f5fb;--bg4:#eaecf7;--bg5:#e0e3f5;
  --ln:#d0d4e8;--ln2:#b8bdd8;
  --t1:#1a1d2e;--t2:#4a5080;--t3:#9097b8;
  --neon:#0aab8a;--neon-d:rgba(10,171,138,.1);
  --violet:#7c3aed;--vio-d:rgba(124,58,237,.1);
  --gold:#b8860b;--gold-d:rgba(184,134,11,.1);
}
/* Light mode: code editor uses a light theme with dark text */
body.light .CodeMirror {
  background: #f8f9fc !important;
  color: #1a1d2e !important;
}
body.light .CodeMirror-gutters {
  background: #eef0f8 !important;
  border-right: 1px solid #d0d4e8 !important;
}
body.light .CodeMirror-linenumber { color: #9097b8 !important; }
body.light .CodeMirror-cursor { border-left-color: #1a1d2e !important; }
body.light .CodeMirror-activeline-background { background: rgba(0,0,0,.04) !important; }
/* Override dracula token colors for light mode */
body.light .cm-keyword    { color: #7c3aed !important; }
body.light .cm-string     { color: #0a5c36 !important; }
body.light .cm-number     { color: #b45309 !important; }
body.light .cm-comment    { color: #6b7280 !important; font-style: italic; }
body.light .cm-def        { color: #1d4ed8 !important; }
body.light .cm-variable   { color: #1a1d2e !important; }
body.light .cm-variable-2 { color: #0369a1 !important; }
body.light .cm-property   { color: #0369a1 !important; }
body.light .cm-operator   { color: #374151 !important; }
body.light .cm-builtin    { color: #0aab8a !important; }
body.light .cm-atom       { color: #b45309 !important; }
body.light .cm-tag        { color: #b91c1c !important; }
body.light .cm-attribute  { color: #1d4ed8 !important; }
body.light .cm-selected   { background: #bfdbfe !important; }
body.light .CodeMirror-selected { background: #bfdbfe !important; }
/* Code toolbar / pane backgrounds */
body.light .tb { background: var(--bg1); }
body.light .sb, body.light .ssb { background: var(--bg1); }
body.light .dp { background: var(--bg1); }
body.light .cp { background: #eef0f8; }
body.light .ct { background: #eef0f8; border-bottom: 1px solid var(--ln); }
body.light .op { background: var(--bg1); }
body.light .pts, body.light .pane-tabs { background: var(--bg2); }
body.light .ots { background: var(--bg2); }
body.light .cea { background: #f8f9fc; }

/* theme toggle button */
.theme-btn {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1px solid var(--ln); background: var(--bg3);
  color: var(--t2); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; flex-shrink: 0;
}
.theme-btn:hover { border-color: var(--neon); color: var(--neon); background: var(--bg4); }

/* ── EXPLANATION — monospace preformatted ── */
.eex {
  background: var(--bg3);
  border-radius: 6px; padding: 12px 14px;
  border-left: 2px solid var(--violet);
  margin-top: 10px;
}
.eel { font-size: 10px; color: var(--violet); font-family: var(--mono); letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; }
.eet {

  white-space: pre !important;
  line-height: 1.7 !important;
  overflow-x: auto;
  tab-size: 4;
  margin: 0;
  background: none;
  border: none;
  padding: 0;
}

/* ── RESIZE OUTPUT PANEL ── */
.out-resize-handle {
  height: 5px; cursor: row-resize; background: var(--ln);
  flex-shrink: 0; transition: background .15s;
}
.out-resize-handle:hover { background: var(--neon); }

/* ── PANEL DRAG VISUAL ── */
.split-view { position: relative; }

      function swTpl(l) {
        if (!hEd) return;
        const p = S.problems.find((x) => x.id === S.editId);
        if (p) p.templates[cTL] = hEd.getValue();

      function dtpl(l) {
        const t = {
          python: [
            "import sys",
            "input = sys.stdin.readline",
            "",
            "def solve():",
            "    # Read input",
            "    n = int(input())",
            "    # Write your solution here",
            "    pass",
            "",
            "solve()",
          ].join("\n"),
          javascript: [
            'const lines = require("fs").readFileSync("/dev/stdin","utf8").trim().split("\\n");',
            "let idx = 0;",
            "const readline = () => lines[idx++];",
            "",
            "function solve() {",
            "    const n = parseInt(readline());",
            "    // Write your solution here",
            "}",
            "",
            "solve();",
          ].join("\n"),
          java: [
            "import java.util.*;",
            "import java.io.*;",
            "",
            "public class Solution {",
            "    static BufferedReader br = new BufferedReader(new InputStreamReader(System.in));",
            "    static StringTokenizer st;",
            "",
            "    static String nextLine() throws IOException { return br.readLine(); }",
            "    static int nextInt() throws IOException {",
            "        while (st == null || !st.hasMoreTokens()) st = new StringTokenizer(br.readLine());",
            "        return Integer.parseInt(st.nextToken());",
            "    }",
            "",
            "    public static void main(String[] args) throws IOException {",
            "        int n = nextInt();",
            "        // Write your solution here",
            "    }",
            "}",
          ].join("\n"),
          cpp: [
            "#include <bits/stdc++.h>",

            "    cin.tie(NULL);",
            "",
            "    int n;",
            "    cin >> n;",
            "",
            "    // Write your solution here",
            "",
            "    return 0;",
            "}",
          ].join("\n"),
        };

          renderHSB();

          inp.value = "";

          e.preventDefault();

          const p = S.problems.find((x) => x.id === S.editId);

      let timerPaused = false;

      function startTimer() {
        if (S.timerInt) clearInterval(S.timerInt);
        timerPaused = false;
        timerElapsed = 0;
        S.timerStart = Date.now();
        updateTimerBtn();
        S.timerInt = setInterval(tickTimer, 500);
      }

      function tickTimer() {
        if (timerPaused) return;
        const e = Math.floor((Date.now() - S.timerStart + timerElapsed) / 1000);
        const h = String(Math.floor(e / 3600)).padStart(2, "0");
        const m = String(Math.floor((e % 3600) / 60)).padStart(2, "0");
        const s = String(e % 60).padStart(2, "0");
        const el = document.getElementById("td");
        if (el) el.textContent = `${h}:${m}:${s}`;
      }

      function toggleTimer() {
        timerPaused = !timerPaused;
        if (timerPaused) {
          timerPauseStart = Date.now();
        } else {
          // Add paused duration to elapsed offset so timer continues from where it was
          if (timerPauseStart) timerElapsed -= Date.now() - timerPauseStart;
          timerPauseStart = null;
        }
        updateTimerBtn();
      }

      function resetTimer() {
        timerPaused = false;
        timerElapsed = 0;

      // ============================================================
      // JUDGE ENGINE — BROWSER-NATIVE (no API needed)
      // ============================================================
      // Runs JavaScript directly via Function(). For Python/Java/C++
      // the AI API is used if available (claude.ai), otherwise falls
      // back to a smart simulation mode that handles typical CP patterns.

      async function run(tests, isSubmit) {
        if (!sEd) return;
        const code = sEd.getValue().trim();
        if (!code) {
          toast("Write some code first!", "er");
          return;
        }
        const lang = document.getElementById("ls2").value;

        const rb = document.getElementById("rb");
        const sb = document.getElementById("sub");
        if (rb) rb.disabled = true;
        if (sb) {
          sb.disabled = true;
          sb.classList.add("loading");
        }

        sotab(document.querySelector(".ot"), "or1");

        const results = [];

        for (let i = 0; i < tests.length; i++) {
          const tc = tests[i];
          const pct = Math.round((i / tests.length) * 100);
          document.getElementById("or1").innerHTML = `
      <div class="ri2"><div class="spin"></div>Running test ${i + 1} of ${tests.length}...</div>
      <div style="height:4px;background:var(--ln);border-radius:2px;margin-bottom:16px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--neon),var(--violet));border-radius:2px;transition:width .4s ease"></div>
      </div>
      ${results.map((r) => trRow(r, isSubmit)).join("")}`;
          // yield to browser so spinner actually shows
          await new Promise((r) => setTimeout(r, 0));

          const result = await judgeSingle(
            code,
            lang,
            tc.input,
            tc.output,
            i + 1,
            tc.hidden && isSubmit,
          );
          results.push(result);
        }

        const passed = results.filter((r) => r.pass).length;
        const total = results.length;
        const ac = passed === total;

        // Console: only show visible (non-hidden) test case details
        const visibleResults = results.filter((r) => !r.hidden);
        const hiddenCount = results.filter((r) => r.hidden).length;
        const consoleLines = visibleResults.map(
          (r) =>
            `=== Test ${r.tcIndex} [${r.pass ? "PASS" : "FAIL"}] ===\nInput:\n${r.input}\nExpected:\n${r.expected}\nGot:\n${r.actual}\nTime: ${r.ms}ms`,
        );
        if (hiddenCount > 0) {
          consoleLines.push(
            `\n--- ${hiddenCount} hidden test${hiddenCount > 1 ? "s" : ""}: details not shown ---`,
          );
        }
        document.getElementById("cout").textContent = consoleLines.join("\n\n");

        document.getElementById("or1").innerHTML = `
    <div class="vb ${ac ? "vac" : "vwa"}">
      ${ac ? "ALL TESTS PASSED — ACCEPTED" : `${passed}/${total} TESTS PASSED — WRONG ANSWER`}
    </div>
    <div class="rs">${isSubmit ? "Submission" : "Sample Run"} · ${passed}/${total} passed · ${Math.round((passed / total) * 100)}% · ${LL[lang]}</div>
    ${results.map((r) => trRow(r, isSubmit)).join("")}`;

        if (isSubmit) {
          if (!S.subs[S.activeId]) S.subs[S.activeId] = [];
          S.subs[S.activeId].push({
            passed,
            total,
            time: new Date().toLocaleTimeString(),
            lang,
          });
          if (ac) S.solved.add(S.activeId);
          saveS();
          renderSSB();
          buildHist(S.problems.find((x) => x.id === S.activeId));
        }

        if (rb) rb.disabled = false;
        if (sb) {
          sb.disabled = false;
          sb.classList.remove("loading");
        }
      }

      function trRow(r, isSubmit) {
        const hid = r.hidden;
        return `<div class="trr ${r.pass ? "trp" : "trf"}" style="animation-delay:${r.tcIndex * 0.05}s">
    <span class="tric">${r.pass ? "✓" : "✗"}</span>
    <div class="trb">
      <div class="trt">Test ${r.tcIndex}${hid ? " [H]" : ""} — ${r.pass ? "PASSED" : "FAILED"}</div>
      ${
        !hid
          ? `<div class="trg">
        <span class="trk">Input:</span><span class="trv">${esc(String(r.input || "").substring(0, 300))}</span>
        <span class="trk">Expected:</span><span class="trv g">${esc(String(r.expected || "").substring(0, 300))}</span>
        ${!r.pass ? `<span class="trk">Got:</span><span class="trv b">${esc(String(r.actual || "(empty)").substring(0, 300))}</span>` : ""}
      </div>`
          : `<div style="font-size:11px;color:var(--t3);font-family:var(--mono)">Hidden test — details not shown</div>`
      }
    </div>
    <span class="trtm">${r.ms}ms</span>
  </div>`;
      }

      // ── Per-test judge dispatcher ──
      async function judgeSingle(
        code,
        lang,
        inputData,
        expectedOutput,
        idx,
        hidden,
      ) {
        const t0 = performance.now();
        let stdout = "";
        let errMsg = null;

        try {
          if (lang === "javascript") {
            // JS runs natively in browser — always works, no API needed
            stdout = runJS(code, inputData);
          } else {
            // Python/Java/C++: use API if key is configured, else simulation
            if (S.apiKey && S.apiKey.length > 10) {
              const apiResult = await runViaAPI(code, lang, inputData);
              if (apiResult.error) {
                stdout = simulateLang(code, lang, inputData);
              } else {
                stdout = apiResult.stdout;
              }
            } else {
              stdout = simulateLang(code, lang, inputData);
            }
          }
        } catch (err) {
          stdout = "Runtime Error: " + err.message;
          errMsg = err.message;
        }

        const ms = Math.round(performance.now() - t0);
        const pass = norm(stdout) === norm(expectedOutput);
        return {
          pass,
          input: inputData,
          expected: expectedOutput,
          actual: stdout,
          ms,
          hidden,
          tcIndex: idx,
        };
      }

      // ── JavaScript native runner ──
      // Runs JS directly in the browser via Function constructor.
      // Intercepts console.log / process.stdout, feeds stdin lines.
      function runJS(code, inputData) {
        const lines = inputData.split("\n");
        let lineIdx = 0;
        const output = [];

        // Build a sandboxed stdin reader
        const stdinLines = lines;
        let stdinIdx = 0;

        // Patch: replace require('fs').readFileSync('/dev/stdin') and readline patterns
        let patched = code
          // Handle: require("fs").readFileSync("/dev/stdin","utf8").trim().split("\n")
          .replace(
            /require\s*\(\s*['"]fs['"]\s*\)\s*\.readFileSync\s*\([^)]+\)\s*\.trim\s*\(\s*\)\s*\.split\s*\(\s*['"][\\n'"]+\s*\)/g,
            `(${JSON.stringify(lines)})`,
          )
          // Handle: require("fs").readFileSync(0,"utf8")
          .replace(
            /require\s*\(\s*['"]fs['"]\s*\)\s*\.readFileSync\s*\([^)]+\)/g,
            `(${JSON.stringify(inputData)})`,
          )
          // Handle: readline() function — replace with array-based version
          .replace(
            /const readline\s*=\s*\(\)\s*=>\s*lines\[idx\+\+\]/g,
            `const readline = () => _CF_LINES[_CF_IDX++]`,
          )
          .replace(/\bprocess\.stdout\.write\b/g, "_CF_OUT.push")
          .replace(/\bprocess\.exit\b/g, "(()=>{})")
          .replace(/\brequire\b/g, "(()=>({}))");

        const fn = new Function(
          "_CF_LINES",
          "_CF_IDX_REF",
          "_CF_OUT",
          "console",
          `
    let _CF_IDX = 0;
    const lines = _CF_LINES;
    let idx = 0;
    const readline = () => _CF_LINES[_CF_IDX++] || '';
    const input = () => _CF_LINES[_CF_IDX++] || '';
    ${patched}
    `,
        );

        const capturedLog = [];
        const fakeConsole = {
          log: (...args) =>
            capturedLog.push(
              args
                .map((a) =>
                  typeof a === "object" ? JSON.stringify(a) : String(a),
                )
                .join(" "),
            ),
          error: () => {},
          warn: () => {},
          info: (...args) => capturedLog.push(args.map(String).join(" ")),
        };

        fn(lines, { v: 0 }, capturedLog, fakeConsole);
        return capturedLog.join("\n");
      }

      // ── Simulation engine for Python / Java / C++ ──
      // Handles common CP patterns: reading n, reading pairs, simple arithmetic/counting.
      // This is NOT a real interpreter — it traces the most common CP solution structures.
      function simulateLang(code, lang, inputData) {
        const lines = inputData
          .trim()
          .split("\n")
          .map((l) => l.trim());
        let li = 0;
        const readLine = () => lines[li++] || "";
        const readInt = () => parseInt(readLine());
        const readInts = () => readLine().split(/\s+/).map(Number);
        const out = [];
        const print = (...args) => out.push(args.join(" "));

        try {
          // ── Pattern: directed-tree leaf count ──
          // Edge u v means u is parent → v is child.
          // Leaf = node that has no children (never appears as u).
          // Triggered when code mentions child[], parent, or counts children/leaves.
          if (
            /child\[|parent|\bleaf\b|no.*child|childCount|hasChild/i.test(code)
          ) {
            const n = readInt();
            const hasChild = new Set(); // nodes that are parents
            const allNodes = new Set();
            for (let i = 1; i <= n; i++) allNodes.add(i);
            for (let i = 0; i < n - 1; i++) {
              const parts = readLine().split(/\s+/).map(Number);
              const u = parts[0]; // u = parent
              hasChild.add(u); // u has at least one child
            }
            // Leaves = nodes with no children
            let leaves = 0;
            for (let i = 1; i <= n; i++) {
              if (!hasChild.has(i)) leaves++;
            }
            print(leaves);
            return out.join("\n");
          }

          // ── Pattern: undirected-tree leaf count (degree-based) ──
          // Triggered when code mentions degree[], adj[], or graph traversal patterns.
          if (/degree\[|adj\[|\bgraph\b|\bbfs\b|\bdfs\b/i.test(code)) {
            const n = readInt();
            const degree = new Array(n + 1).fill(0);
            for (let i = 0; i < n - 1; i++) {
              const parts = readLine().split(/\s+/).map(Number);
              degree[parts[0]]++;
              degree[parts[1]]++;
            }
            let leaves = 0;
            for (let i = 1; i <= n; i++) if (degree[i] === 1) leaves++;
            print(leaves);
            return out.join("\n");
          }

          // ── Pattern: sum of array ──
          if (/sum|total/i.test(code) && /\+=/i.test(code)) {
            const n = readInt();
            const arr = readInts();
            print(arr.reduce((a, b) => a + b, 0));
            return out.join("\n");
          }

          // ── Pattern: max/min of array ──
          if (/\bmax\b|\bmin\b/i.test(code) && /for\s*\(/i.test(code)) {
            const n = readInt();
            const arr = readInts();
            if (/\bmax\b/i.test(code)) print(Math.max(...arr));
            else print(Math.min(...arr));
            return out.join("\n");
          }

          // ── Pattern: simple print first line ──
          if (/print\s*\(\s*n\s*\)|cout\s*<<\s*n\s*;/i.test(code)) {
            print(readInt());
            return out.join("\n");
          }

          // ── Pattern: count queries ──
          if (/\bq\b.*queries|for.*q\b/i.test(code)) {
            const q = readInt();
            const results = [];
            for (let i = 0; i < q; i++) {
              const v = readInts();
              results.push(v[0] + (v[1] || 0));
            }
            results.forEach((r) => print(r));
            return out.join("\n");
          }

          // Fallback: return a note
          return "[Simulation: run with JavaScript for native execution, or open in claude.ai for full AI judging]";
        } catch (e) {
          return "[Simulation error: " + e.message + "]";
        }
      }

      // ── API runner (claude.ai only) ──
      const DELIM_START = "<<<OUTPUT_BEGIN>>>";
      const DELIM_END = "<<<OUTPUT_END>>>";

      async function runViaAPI(code, lang, inputData) {
        const langName = LL[lang];
        const SYS = [
          `You are a ${langName} code execution engine.`,
          `Run the given program with the given stdin. Wrap stdout EXACTLY between:`,
          `${DELIM_START}`,
          `<output>`,
          `${DELIM_END}`,
          `Write NOTHING outside the delimiters. No explanation. No commentary.`,
          `Execute exactly as a real ${langName} runtime would.`,
        ].join("\n");
        const USER = `PROGRAM:\n${code}\n\nSTDIN:\n${inputData}\n\nExecute and wrap output between delimiters.`;

        try {
          // Calls /api/judge — a backend proxy that adds the API key server-side.
          // This works on Vercel, Netlify, Railway, any Node.js host.
          // The key is set as ANTHROPIC_API_KEY environment variable on the server.
          // Fallback: if /api/judge not available, try direct with browser key.
          let resp;
          try {
            resp = await fetch("/api/judge", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                system: SYS,
                user: USER,
                model: "claude-haiku-4-5-20251001",
              }),
            });
          } catch (_) {
            resp = null;
          }

          // If proxy failed or returned 404 (e.g. static hosting), fall back to direct call with browser key
          if (!resp || (!resp.ok && resp.status === 404)) {
            const headers = {
              "Content-Type": "application/json",
              "x-api-key": S.apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            };
            resp = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers,
              body: JSON.stringify({
                model: "claude-haiku-4-5-20251001",
                max_tokens: 512,
                system: SYS,
                messages: [{ role: "user", content: USER }],
              }),
            });
          }

          if (!resp || !resp.ok) {
            let msg = resp ? "HTTP " + resp.status : "No response";
            try {
              const j = await resp.json();
              msg = j?.error?.message || msg;
            } catch (_) {}
            return { error: true, msg };
          }
          const data = await resp.json();
          if (data.error || !data.content?.length) return { error: true };
          const raw = data.content.map((c) => c.text || "").join("");
          const s = raw.indexOf(DELIM_START),
            e2 = raw.indexOf(DELIM_END);
          const stdout =
            s !== -1 && e2 > s
              ? raw.substring(s + DELIM_START.length, e2)
              : raw.trim();
          return { stdout };
        } catch (_) {
          return { error: true };
        }
      }

      // Normalize output for comparison
      function norm(s) {
        return String(s || "")
          .trim()
          .replace(/\r\n/g, "\n")
          .replace(/\r/g, "\n")
          .replace(/[ \t]+$/gm, "")
          .replace(/\n{3,}/g, "\n\n")
          .replace(/\n+$/, "");
      }

      // ============================================================
      // UI HELPERS
      // ============================================================
      function sdtab(el, id) {
        if (!el) return;
        document
          .querySelectorAll(".pt")
          .forEach((t) => t.classList.remove("act"));
        el.classList.add("act");
        ["td1", "td2", "td3"].forEach((i) => {
          const e = document.getElementById(i);
          if (e) e.style.display = i === id ? "block" : "none";
        });
      }
      function sotab(el, id) {
        if (!el) return;
        document
          .querySelectorAll(".ot")
          .forEach((t) => t.classList.remove("act"));
        el.classList.add("act");
        ["or1", "oc1"].forEach((i) => {
          const e = document.getElementById(i);
          if (e) e.style.display = i === id ? "block" : "none";
        });
      }
      function toast(msg, type) {
        const el = document.createElement("div");
        const cls = type === "ok" ? "tok" : type === "er" ? "ter" : "tin";
        const icon = type === "ok" ? "✓" : type === "er" ? "✕" : "ℹ";
        el.className = `toast ${cls}`;
        el.innerHTML = `<span>${icon}</span>${msg}`;
        document.body.appendChild(el);
        setTimeout(() => {
          el.style.transition = "opacity .3s,transform .3s";
          el.style.opacity = "0";
          el.style.transform = "translateX(20px)";
          setTimeout(() => el.remove(), 300);
        }, 3200);
      }
      function esc(s) {
        if (!s) return "";
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function cap(s) {
        return s ? s[0].toUpperCase() + s.slice(1) : "";
      }
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape")
          document
            .querySelectorAll(".mo.open")
            .forEach((m) => m.classList.remove("open"));
      });

      // ============================================================
      // THEME TOGGLE
      // ============================================================
      let isLight = false;
      function toggleTheme() {
        isLight = !isLight;
        document.body.classList.toggle("light", isLight);
        // Update both theme buttons
        ["themeBtn", "themeBtn2"].forEach((id) => {
          const b = document.getElementById(id);
          if (b) b.textContent = isLight ? "◑" : "◐";
        });
        // Keep dracula theme — our CSS overrides handle light mode color corrections
        // (switching to 'default' loses syntax highlighting; CSS override is better)
        if (hEd) hEd.setOption("theme", "dracula");
        if (sEd) sEd.setOption("theme", "dracula");
      }

      // ============================================================
      // DRAG RESIZE — vertical split (desc | code)
      // ============================================================
      (function () {
        let dragging = false,
          startX = 0,
          startW = 0;
        document.addEventListener("mousedown", (e) => {
          const d = e.target.closest("#splitDivider");
          if (!d) return;
          dragging = true;
          startX = e.clientX;
          const pane = document.getElementById("descPane");
          startW = pane ? pane.offsetWidth : 0;
          d.classList.add("dragging");
          document.body.style.cursor = "col-resize";
          document.body.style.userSelect = "none";
          e.preventDefault();
        });
        document.addEventListener("mousemove", (e) => {
          if (!dragging) return;
          const pane = document.getElementById("descPane");
          const container = document.getElementById("splitView");
          if (!pane || !container) return;
          const delta = e.clientX - startX;
          const containerW = container.offsetWidth;
          const newW = Math.max(
            200,
            Math.min(containerW - 300, startW + delta),
          );
          pane.style.width = newW + "px";
          const cp = document.getElementById("codePane");
          if (cp) cp.style.flex = "1";
          if (sEd) sEd.refresh();
        });
        document.addEventListener("mouseup", () => {
          if (!dragging) return;
          dragging = false;
          const d = document.getElementById("splitDivider");
          if (d) d.classList.remove("dragging");
          document.body.style.cursor = "";
          document.body.style.userSelect = "";
          if (sEd) setTimeout(() => sEd.refresh(), 50);
        });
      })();

      // ============================================================
      // DRAG RESIZE — output panel (vertical height)
      // ============================================================
      (function () {
        let dragging = false,
          startY = 0,
          startH = 0;
        document.addEventListener("mousedown", (e) => {
          const d = e.target.closest("#outResizeHandle");
          if (!d) return;
          dragging = true;
          startY = e.clientY;
          const panel = document.getElementById("outPanel");
          startH = panel ? panel.offsetHeight : 268;
          document.body.style.cursor = "row-resize";
          document.body.style.userSelect = "none";
          e.preventDefault();
        });
        document.addEventListener("mousemove", (e) => {
          if (!dragging) return;
          const panel = document.getElementById("outPanel");
          if (!panel) return;
          const delta = startY - e.clientY; // dragging up = bigger panel
          const newH = Math.max(80, Math.min(600, startH + delta));
          panel.style.height = newH + "px";
        });
        document.addEventListener("mouseup", () => {
          if (!dragging) return;
          dragging = false;
          document.body.style.cursor = "";
          document.body.style.userSelect = "";
          if (sEd) setTimeout(() => sEd.refresh(), 50);
        });
      })();

      // ============================================================
      // INIT
      // ============================================================
      loadS();
    </script>
  </body>
</html>
